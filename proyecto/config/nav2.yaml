namespace/local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: namespace/odom
      robot_base_frame: namespace/base_footprint_link
      rolling_window: true
      width: 10
      height: 10
      resolution: 0.05
      footprint: "[ [0.65, 0.30], [0.65, -0.30], [-0.15, -0.30], [-0.15, 0.30] ]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: lidar
        lidar:
          topic: /namespace/laser
          sensor_frame: namespace/base_lidar   # ← AÑADIDO: frame del sensor
          data_type: LaserScan
          clearing: true
          marking: true
          max_obstacle_height: 2.0
          min_obstacle_height: -0.1
          obstacle_max_range: 10.0
          obstacle_min_range: 0.0
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          inf_is_valid: false
          qos_overrides:
            /namespace/laser:
              reliability: reliable        # ← FIX PRINCIPAL: QoS mismatch
              durability: volatile
              history: keep_last
              depth: 10
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.4


namespace/global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: namespace/base_footprint_link
      resolution: 0.05
      footprint: "[ [0.65, 0.30], [0.65, -0.30], [-0.15, -0.30], [-0.15, 0.30] ]"
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: "/map"
        subscribe_to_updates: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: lidar
        lidar:
          topic: /namespace/laser
          sensor_frame: namespace/base_lidar   # ← AÑADIDO: frame del sensor
          data_type: LaserScan
          clearing: true
          marking: true
          max_obstacle_height: 2.0
          min_obstacle_height: -0.1
          obstacle_max_range: 10.0
          obstacle_min_range: 0.0
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          inf_is_valid: false
          qos_overrides:
            /namespace/laser:
              reliability: reliable        # ← FIX PRINCIPAL: QoS mismatch
              durability: volatile
              history: keep_last
              depth: 10
          
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.8
        cost_scaling_factor: 3.0

# ---- Planner ----
namespace/planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"

# ---- Controller ----
namespace/controller_server:
  ros__parameters:
    use_sim_time: true
    robot_base_frame: namespace/base_footprint_link
    cmd_vel_topic: /cmd_vel
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.8
      lookahead_dist: 0.8
      use_rotate_to_heading: true # <--- Añadido
      rotate_to_heading_angular_vel: 0.5 # <--- Añadido
      rotate_to_heading_min_angle: 0.3
    ros__remappings:
       /cmd_vel: /namespace/cmd_vel

# ---- Smoother (opcional pero común) ----
namespace/smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"

# ---- BT Navigator ----
